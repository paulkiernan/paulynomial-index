name: Release

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true

  publish:
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_tag }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.new_tag }},enable=${{ !startsWith(needs.release.outputs.new_tag, 'v0.') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update homelab deployment tag
        env:
          NEW_TAG: ${{ needs.release.outputs.new_tag }}
        run: |
          IMAGE_TAG="${NEW_TAG#v}"
          git clone https://x-access-token:${{ secrets.HOMELAB_TOKEN }}@github.com/paulkiernan/homelab.git
          cd homelab
          sed -i "s|ghcr.io/paulkiernan/paulynomial-index:.*|ghcr.io/paulkiernan/paulynomial-index:${IMAGE_TAG}|" \
            kubernetes/argocd/apps/workloads/paulynomial-index/manifests/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/argocd/apps/workloads/paulynomial-index/manifests/deployment.yaml
          git commit -m "chore: bump paulynomial-index to ${IMAGE_TAG}"
          git push
