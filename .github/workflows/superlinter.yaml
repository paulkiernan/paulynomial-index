name: Super-Linter

# Runs standalone on PRs, and as the lint gate inside release.yml on main
# pushes (workflow_call) — no separate push trigger, or it would run twice.
on:
  pull_request:
  workflow_call:

jobs:
  super-lint:
    # Name the Job
    name: Lint code base
    # Set the type of machine to run on
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: github/super-linter@v4
        env:
          DEFAULT_BRANCH: main
          # entrainment/ is a vendored submodule with its own CI
          FILTER_REGEX_EXCLUDE: .*(404\.html|entrainment/).*
          OUTPUT_DETAILS: detailed
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_CSS: true
          VALIDATE_DOCKERFILE: true
          VALIDATE_HTML: true
          VALIDATE_JAVASCRIPT_STANDARD: true
          VALIDATE_JSON: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
