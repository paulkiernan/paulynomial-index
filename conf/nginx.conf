server {
    listen       80;
    server_name  localhost;

    location / {
        root   /src;
        index  index.html;
    }

    # SomaFM serves browser User-Agents a 302 self-redirect (?_ic2=<ts>) that
    # nginx would pass through to the client, bouncing it cross-origin and
    # defeating this proxy. Two defenses:
    #   1. Identify as a player client (SomaFM streams 200 directly to those)
    #   2. If an upstream 3xx arrives anyway, follow it server-side (@stream_redirect)
    location /stream {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=30s;
        proxy_pass https://ice2.somafm.com/defcon-128-mp3;
        proxy_set_header Host ice2.somafm.com;
        proxy_set_header User-Agent "entrainment/1.0 (+https://paulynomial.com)";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_ssl_name ice2.somafm.com;
        proxy_buffering off;
        proxy_cache off;
        proxy_intercept_errors on;
        error_page 301 302 307 = @stream_redirect;
    }

    location @stream_redirect {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=30s;
        set $redirect_target $upstream_http_location;
        proxy_pass $redirect_target;
        proxy_set_header Host ice2.somafm.com;
        proxy_set_header User-Agent "entrainment/1.0 (+https://paulynomial.com)";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_ssl_name ice2.somafm.com;
        proxy_buffering off;
        proxy_cache off;
    }

    # Same as /stream but Content-Type is masked as octet-stream so iOS
    # Safari's fetch() doesn't hand the response to WebKit's media loader
    # (the fetch-based analyser fallback needs the raw bytes).
    location /stream-raw {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=30s;
        proxy_pass https://ice2.somafm.com/defcon-128-mp3;
        proxy_set_header Host ice2.somafm.com;
        proxy_set_header User-Agent "entrainment/1.0 (+https://paulynomial.com)";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_ssl_name ice2.somafm.com;
        proxy_buffering off;
        proxy_cache off;
        proxy_hide_header Content-Type;
        add_header Content-Type "application/octet-stream" always;
        proxy_intercept_errors on;
        error_page 301 302 307 = @stream_raw_redirect;
    }

    location @stream_raw_redirect {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=30s;
        set $redirect_target $upstream_http_location;
        proxy_pass $redirect_target;
        proxy_set_header Host ice2.somafm.com;
        proxy_set_header User-Agent "entrainment/1.0 (+https://paulynomial.com)";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_ssl_name ice2.somafm.com;
        proxy_buffering off;
        proxy_cache off;
        proxy_hide_header Content-Type;
        add_header Content-Type "application/octet-stream" always;
    }

    location /healthz {
        add_header Content-Type text/plain;
        return 200 'healthy';
    }

    error_page 404 /404.html;
    location = /404.html {
        root /src/media;
        internal;
    }

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
